services:
  - type: web
    name: noprofit4us-backend
    env: python
    rootDir: application/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: DATABASE_URL
        sync: false # User needs to configure this in the Render dashboard (Supabase Postgres URL)
      - key: SUPABASE_URL
        sync: false # User needs to configure this in the Render dashboard
      - key: SUPABASE_KEY
        sync: false # User needs to configure this in the Render dashboard
      - key: CORS_ORIGINS
        sync: false # User needs to configure this in the Render dashboard (e.g., https://aps-frontend.vercel.app)
